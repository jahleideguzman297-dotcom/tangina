<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>

  <style>
    body{
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(to bottom, #000, #444, #000);
      font-family: Arial, sans-serif;
    }

    .container{
      text-align: center;
      color: white;
      background: rgba(0,0,0,0.8);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1{
      margin-bottom: 10px;
      font-size: 40px;
    }

    p{
      margin-bottom: 25px;
      font-size: 18px;
      color: #ccc;
    }

    .btn{
      display: inline-block;
      padding: 12px 25px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
      font-size: 16px;
    }

    .btn:hover{
      background: gray;
      color: white;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully.</p>

    <a href="website.html" class="btn">Return to Home</a>
  </div>

</body>
</html>
